version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: postgres-chat
    restart: always
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - postgres
    environment:
      DATABASE_URL: postgresql://chatuser:chatpass@postgres:5432/chatdb
      OLLAMA_URL: http://ollama:11434
    volumes:
      - .:/app

volumes:
  ollama_data:
  postgres_data: